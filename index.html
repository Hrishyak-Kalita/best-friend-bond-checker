
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>bond.sync ✨</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- SCREENSHOT LIBRARY -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

  <!-- STARS -->
  <div class="stars" id="stars"></div>

  <!-- ORBS -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>

  <!-- MAIN CARD -->
  <div class="card" id="card">

    <h1>✨ bond.sync</h1>

    <p class="subtitle">
      Some friendships are too powerful for reality ♾️
    </p>

    <div class="input-box">
      <input
        type="text"
        id="name1"
        placeholder="Enter First Name"
      >
    </div>

    <div class="input-box">
      <input
        type="text"
        id="name2"
        placeholder="Enter Best Friend Name"
      >
    </div>

    <button onclick="checkBond()">
      Analyze Friendship Energy ✨
    </button>

    <!-- RESULT -->
    <div class="result" id="result">

      <div>

        <div class="circle-wrap">

          <svg class="progress-ring" width="150" height="150">

            <circle
              class="progress-bg"
              cx="75"
              cy="75"
              r="65"
            />

            <circle
              class="progress-bar"
              id="progressBar"
              cx="75"
              cy="75"
              r="65"
            />

          </svg>

          <div class="percentage" id="percentage">
            ♾️
          </div>

        </div>

        <div class="result-text">
          Your friendship aura will appear here 💫
        </div>

      </div>

    </div>

    <!-- ACTIONS -->
    <div class="actions">

      <button class="secondary-btn" onclick="saveResult()">
        📸 Save Result
      </button>

    </div>

    <!-- LIVE USERS -->
    <div class="online-box">
      🌍 <span id="onlineUsers">12</span> people syncing bonds now
    </div>

    <!-- VISITS -->
    <div class="visit-box">
      👀 Visitors:
      <span id="visitCount">0</span>
    </div>

    <div class="footer">
      Made with chaos, memes & emotional damage 💖
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
