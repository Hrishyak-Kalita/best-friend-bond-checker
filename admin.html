<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>bond.sync // terminal</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#020404;

      color:#00ff9d;

      min-height:100vh;

      overflow-x:hidden;

      font-family:'Share Tech Mono',monospace;

      position:relative;

      padding:24px;

    }

    body::before{

      content:"";

      position:fixed;

      inset:0;

      background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
      );

      pointer-events:none;

      animation:flicker 0.12s infinite;

      opacity:0.2;

      z-index:999;
    }

    @keyframes flicker{

      0%{
        opacity:0.16;
      }

      50%{
        opacity:0.22;
      }

      100%{
        opacity:0.16;
      }

    }

    .matrix{

      position:fixed;

      inset:0;

      overflow:hidden;

      z-index:-1;

      opacity:0.06;

      font-size:14px;

      white-space:pre-wrap;

      line-height:14px;

      color:#00ff9d;

      user-select:none;
    }

    .terminal{

      border:
      1px solid rgba(0,255,157,0.25);

      background:
      rgba(0,0,0,0.82);

      backdrop-filter:blur(10px);

      border-radius:18px;

      overflow:hidden;

      box-shadow:
      0 0 30px rgba(0,255,157,0.08),
      inset 0 0 20px rgba(0,255,157,0.03);

    }

    .terminal-top{

      background:#04110d;

      padding:14px 18px;

      display:flex;

      justify-content:space-between;

      align-items:center;

      border-bottom:
      1px solid rgba(0,255,157,0.15);

    }

    .terminal-left{

      display:flex;

      align-items:center;

      gap:10px;
    }

    .circle{

      width:12px;
      height:12px;

      border-radius:50%;
    }

    .red{
      background:#ff4d6d;
    }

    .yellow{
      background:#ffd166;
    }

    .green{
      background:#00ff9d;
    }

    .terminal-title{

      color:#00ff9d;

      font-family:'Orbitron',sans-serif;

      letter-spacing:2px;

      font-size:0.9rem;
    }

    .status{

      display:flex;

      align-items:center;

      gap:10px;

      color:#00ff9d;

      font-size:0.85rem;
    }

    .pulse{

      width:10px;
      height:10px;

      border-radius:50%;

      background:#00ff9d;

      animation:pulse 1s infinite;
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
        opacity:1;
      }

      50%{
        transform:scale(1.7);
        opacity:0.3;
      }

      100%{
        transform:scale(1);
        opacity:1;
      }

    }

    .content{

      padding:28px;

    }

    .type{

      overflow:hidden;

      border-right:2px solid #00ff9d;

      white-space:nowrap;

      width:fit-content;

      animation:
      typing 3s steps(40,end),
      blink 0.8s infinite;

      font-size:1.4rem;

      margin-bottom:28px;

      color:#00ff9d;
    }

    @keyframes typing{

      from{
        width:0;
      }

      to{
        width:100%;
      }

    }

    @keyframes blink{

      50%{
        border-color:transparent;
      }

    }

    .grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:20px;

      margin-bottom:30px;
    }

    .card{

      border:
      1px solid rgba(0,255,157,0.18);

      background:
      rgba(0,255,157,0.03);

      padding:20px;

      border-radius:14px;

      position:relative;

      overflow:hidden;

      transition:0.3s;
    }

    .card:hover{

      transform:translateY(-5px);

      box-shadow:
      0 0 20px rgba(0,255,157,0.12);

    }

    .card::before{

      content:"";

      position:absolute;

      inset:0;

      background:
      linear-gradient(
        120deg,
        transparent,
        rgba(0,255,157,0.08),
        transparent
      );

      transform:translateX(-100%);

      transition:0.7s;
    }

    .card:hover::before{

      transform:translateX(100%);
    }

    .label{

      color:#00ff9d;

      opacity:0.65;

      margin-bottom:14px;

      letter-spacing:2px;

      font-size:0.8rem;
    }

    .value{

      font-size:2.3rem;

      font-weight:700;

      color:#00ff9d;

      text-shadow:
      0 0 10px rgba(0,255,157,0.5);

    }

    .panel{

      border:
      1px solid rgba(0,255,157,0.18);

      background:
      rgba(0,255,157,0.03);

      border-radius:16px;

      padding:22px;

    }

    .panel-title{

      margin-bottom:20px;

      font-size:1rem;

      letter-spacing:2px;

      color:#00ff9d;

    }

    .feed-item{

      display:flex;

      justify-content:space-between;

      align-items:center;

      padding:18px;

      margin-bottom:16px;

      border-radius:12px;

      background:
      rgba(0,0,0,0.55);

      border:
      1px solid rgba(0,255,157,0.12);

      transition:0.25s;

      position:relative;
    }

    .feed-item:hover{

      transform:translateX(8px);

      border-color:
      rgba(0,255,157,0.35);

      box-shadow:
      0 0 18px rgba(0,255,157,0.08);

    }

    .feed-item::before{

      content:">";

      position:absolute;

      left:-12px;

      color:#00ff9d;
    }

    .pair{

      color:#00ff9d;

      font-size:1rem;

      margin-bottom:6px;
    }

    .time{

      opacity:0.55;

      font-size:0.82rem;
    }

    .score{

      font-size:1.4rem;

      font-weight:700;

      color:#00ff9d;

      text-shadow:
      0 0 10px rgba(0,255,157,0.4);

    }

    .footer{

      margin-top:24px;

      text-align:center;

      opacity:0.45;

      font-size:0.8rem;

      letter-spacing:2px;

    }

    .scan{

      position:fixed;

      top:-100%;

      left:0;

      width:100%;

      height:120px;

      background:
      linear-gradient(
        to bottom,
        transparent,
        rgba(0,255,157,0.08),
        transparent
      );

      animation:scan 4s linear infinite;

      pointer-events:none;

      z-index:99;
    }

    @keyframes scan{

      0%{
        top:-120px;
      }

      100%{
        top:100%;
      }

    }

    @media(max-width:768px){

      body{
        padding:14px;
      }

      .type{
        font-size:1rem;
      }

      .value{
        font-size:1.8rem;
      }

      .feed-item{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
      }

    }

  </style>

</head>

<body>

  <div class="matrix" id="matrix"></div>

  <div class="scan"></div>

  <div class="terminal">

    <div class="terminal-top">

      <div class="terminal-left">

        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green"></div>

        <div class="terminal-title">
          bond.sync://friendship-analytics-terminal
        </div>

      </div>

      <div class="status">

        <div class="pulse"></div>

        SYSTEM ACTIVE

      </div>

    </div>

    <div class="content">

      <div class="type">
        initializing neural friendship engine...
      </div>

      <div class="grid">

        <div class="card">

          <div class="label">
            TOTAL VISITORS
          </div>

          <div
            class="value"
            id="visitors"
          >
            --
          </div>

        </div>

        <div class="card">

          <div class="label">
            BOND CHECKS
          </div>

          <div
            class="value"
            id="checks"
          >
            --
          </div>

        </div>

        <div class="card">

          <div class="label">
            SYSTEM STATUS
          </div>

          <div
            class="value"
            style="font-size:1.4rem;"
          >
            ONLINE
          </div>

        </div>

      </div>

      <div class="panel">

        <div class="panel-title">
          >>> LIVE FRIENDSHIP FEED
        </div>

        <div id="feed"></div>

      </div>

      <div class="footer">

        bond.sync neural analytics // encrypted emotional intelligence core

      </div>

    </div>

  </div>

  <script>

    async function loadAdmin(){

      try{

        const params =
        new URLSearchParams(
          window.location.search
        );

        const key =
        params.get("key") || "";

        const response =
        await fetch(
          `/api/admin?key=${key}`
        );

        const data =
        await response.json();

        if(data.error){

          document.body.innerHTML = `

            <div style="
              display:flex;
              justify-content:center;
              align-items:center;
              height:100vh;
              font-size:2rem;
              color:#ff4d6d;
              font-family:'Share Tech Mono',monospace;
            ">

              [ ACCESS DENIED ]

            </div>

          `;

          return;
        }

        document.getElementById(
          "visitors"
        ).innerText =
        data.totalVisitors;

        document.getElementById(
          "checks"
        ).innerText =
        data.recentBonds.length;

        const feed =
        document.getElementById("feed");

        feed.innerHTML = "";

        if(data.recentBonds.length === 0){

          feed.innerHTML = `

            <div class="feed-item">

              no friendship activity detected...

            </div>

          `;

          return;

        }

        data.recentBonds.forEach(item=>{

          const div =
          document.createElement("div");

          div.classList.add("feed-item");

          div.innerHTML = `

            <div>

              <div class="pair">

                ${item.name1}
                ⇄
                ${item.name2}

              </div>

              <div class="time">

                ${new Date(
                  item.time
                ).toLocaleString()}

              </div>

            </div>

            <div class="score">

              ${item.score}%

            </div>

          `;

          feed.appendChild(div);

        });

      }catch(error){

        console.log(error);

      }

    }

    loadAdmin();



    // MATRIX EFFECT

    const matrix =
    document.getElementById("matrix");

    const chars =
    "01アイウエオABCDEFGHIJKLMNOPQRSTUVWXYZ";

    let output = "";

    for(let i=0;i<2500;i++){

      output +=
      chars[
        Math.floor(
          Math.random()*chars.length
        )
      ];

      if(i%120===0){
        output += "\n";
      }

    }

    matrix.innerText = output;

  </script>

</body>

</html>
